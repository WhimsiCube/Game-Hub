<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="icon.png">
<meta charset="UTF-8">
<title>Universal Code Converter</title>
<!-- Google Fonts: Lexend for UI only -->
<link href="https://fonts.googleapis.com/css2?family=Lexend&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Lexend', sans-serif;
        background: #f5f5f5;
        margin: 20px;
        color: #333;
    }

    h1 {
        font-weight: 900;
        color: #2c3e50;
        text-align: center;
    }

    label {
        font-weight: 500;
    }

    select, button, input[type="file"] {
        margin-top: 10px;
        padding: 8px 12px;
        font-family: 'Lexend', sans-serif;
        font-size: 14px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    button {
        background-color: #3498db;
        color: white;
        cursor: pointer;
        border: none;
    }

    button:hover {
        background-color: #2980b9;
    }

    #converter {
        max-width: 900px;
        margin: 0 auto;
    }

    iframe {
        width: 100%;
        height: 400px;
        border: 1px solid #ccc;
        margin-top: 10px;
    }
</style>
</head>
<body>

<h1>Universal Code/TXT Converter</h1>

<div id="converter">
    <label>Select file:</label>
    <input type="file" id="inputFile" accept=".txt,.json,.html,.js,.py,.css"><br>

    <label>Input format:</label>
    <select id="inputFormat">
        <option value="txt">TXT</option>
        <option value="html">HTML</option>
        <option value="js">JavaScript</option>
        <option value="py">Python</option>
        <option value="css">CSS</option>
        <option value="json">JSON</option>
    </select><br>

    <label>Convert to:</label>
    <select id="outputFormat">
        <option value="txt">TXT</option>
        <option value="html">HTML</option>
        <option value="js">JavaScript</option>
        <option value="py">Python</option>
        <option value="css">CSS</option>
        <option value="json">JSON</option>
    </select><br>

    <button onclick="convertFile()">Convert & Download</button>

    <h2>Preview:</h2>
    <iframe id="previewFrame"></iframe>
</div>

<script>
function convertFile() {
    const fileInput = document.getElementById('inputFile');
    const inputFormat = document.getElementById('inputFormat').value;
    const outputFormat = document.getElementById('outputFormat').value;
    const previewFrame = document.getElementById('previewFrame');

    if (!fileInput.files.length) {
        alert("Please select a file!");
        return;
    }

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        let content = e.target.result;
        let output = content;

        // Conversion logic
        switch(outputFormat) {
            case 'txt':
                output = content;
                break;
            case 'html':
                output = `<pre>\n${content}\n</pre>`;
                break;
            case 'js':
                output = `// JavaScript file\n${content}`;
                break;
            case 'py':
                output = `# Python file\n${content}`;
                break;
            case 'css':
                output = `/* CSS file */\n${content}`;
                break;
            case 'json':
                try {
                    const parsed = JSON.parse(content);
                    output = JSON.stringify(parsed, null, 4);
                } catch {
                    output = JSON.stringify({ "content": content }, null, 4);
                }
                break;
        }

        // Update preview in iframe
        previewFrame.contentDocument.open();
        previewFrame.contentDocument.write(output);
        previewFrame.contentDocument.close();

        // Create downloadable file
        const blob = new Blob([output], {type: "text/plain"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `converted.${outputFormat}`;
        link.click();
    };

    reader.readAsText(file);
}
</script>

</body>
</html>
